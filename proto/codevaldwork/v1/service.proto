syntax = "proto3";

package codevaldwork.v1;

option go_package = "github.com/aosanya/CodeValdWork/gen/go/codevaldwork/v1;codevaldworkv1";

import "codevaldwork/v1/codevaldwork.proto";
import "google/protobuf/struct.proto";

// TaskService is the single gRPC service exposed by CodeValdWork.
// All operations are scoped to an agency via agency_id.
service TaskService {

  // ── Task lifecycle ─────────────────────────────────────────────────────────

  // CreateTask creates a new task for the agency in PENDING status.
  // Error: ALREADY_EXISTS if a task with the same ID exists.
  // Error: INVALID_ARGUMENT if required fields (title) are missing.
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);

  // GetTask retrieves a single task by ID within the agency.
  // Error: NOT_FOUND if the task does not exist.
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);

  // GetTaskByName retrieves a task by its project-scoped name (task_name)
  // within a project (project_name). Falls back to ID lookup when task_name
  // looks like a UUID.
  // Error: NOT_FOUND if no task with that name exists in the project.
  rpc GetTaskByName(GetTaskByNameRequest) returns (GetTaskByNameResponse);

  // UpdateTask replaces mutable task fields.
  // Status transitions are validated server-side.
  // Error: NOT_FOUND if the task does not exist.
  // Error: FAILED_PRECONDITION if the status transition is invalid OR
  // if the pending → in_progress transition is gated by non-terminal
  // blocker tasks (carries a BlockedByInfo detail).
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);

  // DeleteTask permanently removes a task.
  // Error: NOT_FOUND if the task does not exist.
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);

  // ListTasks returns all tasks for the agency matching the filter.
  // Returns an empty list (not an error) when no tasks match.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);

  // ── Agent + assignment ─────────────────────────────────────────────────────

  // AssignTask sets the agent currently responsible for a task by writing
  // the `assigned_to` graph edge. Replaces any prior assignee.
  // Error: NOT_FOUND if the task or agent does not exist.
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse);

  // UnassignTask removes any outbound `assigned_to` edge from the task.
  // Idempotent. Error: NOT_FOUND only if the task itself is missing.
  rpc UnassignTask(UnassignTaskRequest) returns (UnassignTaskResponse);

  // UpsertAgent creates or merges an Agent vertex keyed by the natural key
  // (agency_id, agent.agent_id).
  rpc UpsertAgent(UpsertAgentRequest) returns (UpsertAgentResponse);

  // GetAgent reads an Agent by entity ID.
  // Error: NOT_FOUND if the agent does not exist.
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);

  // ListAgents returns every Agent in the agency.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // ── Project CRUD + membership ──────────────────────────────────────────────

  // CreateTaskInProject creates a task and immediately adds it as a member of
  // the given project. The server auto-generates task_name using the project's
  // task_prefix (e.g. "MVP-001", "MVP-002").
  // Error: NOT_FOUND if the project does not exist.
  // Error: INVALID_ARGUMENT if task title is empty.
  rpc CreateTaskInProject(CreateTaskInProjectRequest) returns (CreateTaskInProjectResponse);

  // CreateProject creates a new Project vertex.
  // Error: ALREADY_EXISTS if the project ID is already taken.
  // Error: INVALID_ARGUMENT if name is empty.
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);

  // GetProject retrieves a single Project by entity ID.
  // Error: NOT_FOUND if the project does not exist.
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);

  // GetProjectByName retrieves a single Project by its slug (project_name).
  // Falls back to ID lookup when the value looks like a UUID.
  // Error: NOT_FOUND if no project with that name exists.
  rpc GetProjectByName(GetProjectByNameRequest) returns (GetProjectByNameResponse);

  // UpdateProject patches the mutable fields of an existing Project.
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);

  // DeleteProject removes the project AND all inbound `member_of` edges.
  // Member tasks themselves are preserved.
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // ListProjects returns every Project in the agency.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // AddTaskToProject writes the `member_of` edge from task to project.
  // Idempotent — re-adding an existing membership succeeds without
  // creating a duplicate edge.
  rpc AddTaskToProject(AddTaskToProjectRequest) returns (AddTaskToProjectResponse);

  // RemoveTaskFromProject removes the `member_of` edge from task to project.
  // Error: NOT_FOUND if no membership existed.
  rpc RemoveTaskFromProject(RemoveTaskFromProjectRequest) returns (RemoveTaskFromProjectResponse);

  // ListTasksInProject returns the tasks belonging to the given project via
  // inbound `member_of` edges.
  rpc ListTasksInProject(ListTasksInProjectRequest) returns (ListTasksInProjectResponse);

  // ListProjectsForTask returns the projects a task belongs to via outbound
  // `member_of` edges.
  rpc ListProjectsForTask(ListProjectsForTaskRequest) returns (ListProjectsForTaskResponse);

  // ── Generic graph relationships ────────────────────────────────────────────

  // CreateRelationship validates the (label, from_id, to_id) triple against
  // the Work edge-label whitelist and creates the edge. Idempotent — a
  // matching pre-existing edge is returned without creating a duplicate.
  // Error: INVALID_ARGUMENT (with InvalidRelationshipInfo detail) if the
  // triple is rejected; NOT_FOUND if an endpoint is missing.
  rpc CreateRelationship(CreateRelationshipRequest) returns (CreateRelationshipResponse);

  // DeleteRelationship removes the edge identified by (from_id, to_id, label).
  // Error: NOT_FOUND if no such edge exists.
  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipResponse);

  // TraverseRelationships returns the single-hop edges incident on vertex_id
  // matching the given label and direction. Returns an empty list (not an
  // error) when no edges match.
  rpc TraverseRelationships(TraverseRelationshipsRequest) returns (TraverseRelationshipsResponse);

  // ── Markdown import ────────────────────────────────────────────────────────

  // ImportProject parses a JSON document describing a project and creates a
  // Project vertex, a Task vertex for each entry in "tasks", member_of edges
  // from every Task to the Project, and depends_on edges for each entry in a
  // task's "depends_on" array.
  // All imported tasks start in PENDING status; the original task ID
  // (e.g. "MVP-SF-001") is stored as a tag on each Task for traceability.
  // Error: INVALID_ARGUMENT if the document is malformed or missing required
  // fields ("project", non-empty "tasks", each task needs "id" and "title").
  rpc ImportProject(ImportProjectRequest) returns (ImportProjectResponse);
}

// ── Task lifecycle messages ───────────────────────────────────────────────────

message CreateTaskRequest {
  string agency_id = 1;
  Task   task      = 2;
}
message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string agency_id = 1;
  string task_id   = 2;
}
message GetTaskResponse {
  Task task = 1;
}

message UpdateTaskRequest {
  string agency_id    = 1;
  Task   task         = 2;
  string project_name = 3;    // required when resolving by task.task_name
}
message UpdateTaskResponse {
  Task task = 1;
}

message DeleteTaskRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string task_name    = 3;    // project-scoped name (e.g. "MVP-001"); used when task_id is empty
  string project_name = 4;    // required when resolving by task_name
}
message DeleteTaskResponse {}

message ListTasksRequest {
  string     agency_id = 1;
  TaskFilter filter    = 2;
}
message ListTasksResponse {
  repeated Task tasks = 1;
}

message GetTaskByNameRequest {
  string agency_id    = 1;
  string project_name = 2;
  string task_name    = 3;
}
message GetTaskByNameResponse {
  Task task = 1;
}

message CreateTaskInProjectRequest {
  string agency_id    = 1;
  string project_name = 2;
  Task   task         = 3;
}
message CreateTaskInProjectResponse {
  Task task = 1;
}

// ── Agent assignment messages ─────────────────────────────────────────────────

message AssignTaskRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string agent_id     = 3;  // entity ID of the Agent vertex
  string task_name    = 4;  // project-scoped name; used when task_id is empty
  string project_name = 5;  // required when resolving by task_name
}
message AssignTaskResponse {}

message UnassignTaskRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string task_name    = 3;  // project-scoped name; used when task_id is empty
  string project_name = 4;  // required when resolving by task_name
}
message UnassignTaskResponse {}

message UpsertAgentRequest {
  string agency_id = 1;
  Agent  agent     = 2;
}
message UpsertAgentResponse {
  Agent agent = 1;
}

message GetAgentRequest {
  string agency_id = 1;
  string agent_id  = 2;  // entity ID
}
message GetAgentResponse {
  Agent agent = 1;
}

message ListAgentsRequest {
  string agency_id = 1;
}
message ListAgentsResponse {
  repeated Agent agents = 1;
}

// ── Project messages ──────────────────────────────────────────────────────────

message CreateProjectRequest {
  string  agency_id = 1;
  Project project   = 2;
}
message CreateProjectResponse {
  Project project = 1;
}

message GetProjectRequest {
  string agency_id    = 1;
  string project_id   = 2;
  string project_name = 3;
}
message GetProjectResponse {
  Project project = 1;
}

message GetProjectByNameRequest {
  string agency_id    = 1;
  string project_name = 2;
}
message GetProjectByNameResponse {
  Project project = 1;
}

message UpdateProjectRequest {
  string  agency_id = 1;
  Project project   = 2;
}
message UpdateProjectResponse {
  Project project = 1;
}

message DeleteProjectRequest {
  string agency_id    = 1;
  string project_id   = 2;
  string project_name = 3;
}
message DeleteProjectResponse {}

message ListProjectsRequest {
  string agency_id = 1;
}
message ListProjectsResponse {
  repeated Project projects = 1;
}

message AddTaskToProjectRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string project_id   = 3;
  string project_name = 4;
}
message AddTaskToProjectResponse {}

message RemoveTaskFromProjectRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string project_id   = 3;
  string project_name = 4;
}
message RemoveTaskFromProjectResponse {}

message ListTasksInProjectRequest {
  string agency_id    = 1;
  string project_id   = 2;
  string project_name = 3;
}
message ListTasksInProjectResponse {
  repeated Task tasks = 1;
}

message ListProjectsForTaskRequest {
  string agency_id = 1;
  string task_id   = 2;
}
message ListProjectsForTaskResponse {
  repeated Project projects = 1;
}

// ── Relationship messages ─────────────────────────────────────────────────────

message CreateRelationshipRequest {
  string                 agency_id  = 1;
  string                 label      = 2;
  string                 from_id    = 3;
  string                 to_id      = 4;
  google.protobuf.Struct properties = 5;
}
message CreateRelationshipResponse {
  Relationship relationship = 1;
}

message DeleteRelationshipRequest {
  string agency_id = 1;
  string label     = 2;
  string from_id   = 3;
  string to_id     = 4;
}
message DeleteRelationshipResponse {}

message TraverseRelationshipsRequest {
  string    agency_id = 1;
  string    vertex_id = 2;
  string    label     = 3;
  Direction direction = 4;
}
message TraverseRelationshipsResponse {
  repeated Relationship relationships = 1;
}

// ── Markdown import messages ──────────────────────────────────────────────────

message ImportProjectRequest {
  string agency_id = 1;
  // document is the raw JSON import document. Must be a valid JSON object
  // with a non-empty "project" string and a non-empty "tasks" array where
  // each entry has at minimum "id" and "title" fields.
  string document = 2;
}
message ImportProjectResponse {
  Project        project      = 1;
  repeated Task  tasks        = 2;
  // deps_created is the number of depends_on edges created between tasks.
  int32          deps_created = 3;
}
