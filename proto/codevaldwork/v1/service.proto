syntax = "proto3";

package codevaldwork.v1;

option go_package = "github.com/aosanya/CodeValdWork/gen/go/codevaldwork/v1;codevaldworkv1";

import "codevaldwork/v1/codevaldwork.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";

// TaskService is the single gRPC service exposed by CodeValdWork.
// All operations are scoped to an agency via agency_id.
service TaskService {

  // ── Task lifecycle ─────────────────────────────────────────────────────────

  // CreateTask creates a new task for the agency in PENDING status.
  // Error: ALREADY_EXISTS if a task with the same ID exists.
  // Error: INVALID_ARGUMENT if required fields (title) are missing.
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);

  // GetTask retrieves a single task by ID within the agency.
  // Error: NOT_FOUND if the task does not exist.
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);

  // GetTaskByName retrieves a task by its project-scoped name (task_name)
  // within a project (project_name). Falls back to ID lookup when task_name
  // looks like a UUID.
  // Error: NOT_FOUND if no task with that name exists in the project.
  rpc GetTaskByName(GetTaskByNameRequest) returns (GetTaskByNameResponse);

  // UpdateTask replaces mutable task fields.
  // Status transitions are validated server-side.
  // Error: NOT_FOUND if the task does not exist.
  // Error: FAILED_PRECONDITION if the status transition is invalid OR
  // if the pending → in_progress transition is gated by non-terminal
  // blocker tasks (carries a BlockedByInfo detail).
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);

  // DeleteTask permanently removes a task.
  // Error: NOT_FOUND if the task does not exist.
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);

  // ListTasks returns all tasks for the agency matching the filter.
  // Returns an empty list (not an error) when no tasks match.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);

  // ── Agent + assignment ─────────────────────────────────────────────────────

  // AssignTask sets the agent currently responsible for a task by writing
  // the `assigned_to` graph edge. Replaces any prior assignee.
  // Error: NOT_FOUND if the task or agent does not exist.
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse);

  // UnassignTask removes any outbound `assigned_to` edge from the task.
  // Idempotent. Error: NOT_FOUND only if the task itself is missing.
  rpc UnassignTask(UnassignTaskRequest) returns (UnassignTaskResponse);

  // ── Todo lifecycle ─────────────────────────────────────────────────────────

  // FailTodo marks a TaskTodo as failed and runs the full cascade:
  //   • blockDependentTodos — cascade-fails every blocked todo that
  //     (transitively) depended on this one.
  //   • maybeCompleteParentTask — marks the parent Task failed once all
  //     child todos are terminal.
  //
  // This is the same logic CodeValdWork executes when it receives
  // ai.task.failed from CodeValdAI, but exposed as a direct RPC for
  // operational use (manual override, QA testing).
  //
  // Error: NOT_FOUND if the todo does not exist.
  rpc FailTodo(FailTodoRequest) returns (FailTodoResponse);

  // UnblockTask transitions a task from the `blocked` status (set by the
  // mark-blocked direction option) back to `awaiting-direction`, re-opening
  // the direction form so the human can choose a new action. Returns
  // FAILED_PRECONDITION if the task is not currently in the `blocked` status.
  // Error: NOT_FOUND if the task does not exist.
  rpc UnblockTask(UnblockTaskRequest) returns (UnblockTaskResponse);

  // ListTaskTodos returns TaskTodos for the agency, optionally filtered by
  // workflow_run_id. Returns an empty list (not an error) when none match.
  rpc ListTaskTodos(ListTaskTodosRequest) returns (ListTaskTodosResponse);

  // UpsertAgent creates or merges an Agent vertex keyed by the natural key
  // (agency_id, agent.agent_id).
  rpc UpsertAgent(UpsertAgentRequest) returns (UpsertAgentResponse);

  // GetAgent reads an Agent by entity ID.
  // Error: NOT_FOUND if the agent does not exist.
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);

  // ListAgents returns every Agent in the agency.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // ── Project CRUD + membership ──────────────────────────────────────────────

  // CreateTaskInProject creates a task and immediately adds it as a member of
  // the given project. The server auto-generates task_name using the project's
  // task_prefix (e.g. "MVP-001", "MVP-002").
  // Error: NOT_FOUND if the project does not exist.
  // Error: INVALID_ARGUMENT if task title is empty.
  rpc CreateTaskInProject(CreateTaskInProjectRequest) returns (CreateTaskInProjectResponse);

  // CreateProject creates a new Project vertex.
  // Error: ALREADY_EXISTS if the project ID is already taken.
  // Error: INVALID_ARGUMENT if name is empty.
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);

  // GetProject retrieves a single Project by entity ID.
  // Error: NOT_FOUND if the project does not exist.
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);

  // GetProjectByName retrieves a single Project by its slug (project_name).
  // Falls back to ID lookup when the value looks like a UUID.
  // Error: NOT_FOUND if no project with that name exists.
  rpc GetProjectByName(GetProjectByNameRequest) returns (GetProjectByNameResponse);

  // UpdateProject patches the mutable fields of an existing Project.
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);

  // DeleteProject removes the project AND all inbound `member_of` edges.
  // Member tasks themselves are preserved.
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // ListProjects returns every Project in the agency.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // AddTaskToProject writes the `member_of` edge from task to project.
  // Idempotent — re-adding an existing membership succeeds without
  // creating a duplicate edge.
  rpc AddTaskToProject(AddTaskToProjectRequest) returns (AddTaskToProjectResponse);

  // RemoveTaskFromProject removes the `member_of` edge from task to project.
  // Error: NOT_FOUND if no membership existed.
  rpc RemoveTaskFromProject(RemoveTaskFromProjectRequest) returns (RemoveTaskFromProjectResponse);

  // ListTasksInProject returns the tasks belonging to the given project via
  // inbound `member_of` edges.
  rpc ListTasksInProject(ListTasksInProjectRequest) returns (ListTasksInProjectResponse);

  // ListProjectsForTask returns the projects a task belongs to via outbound
  // `member_of` edges.
  rpc ListProjectsForTask(ListProjectsForTaskRequest) returns (ListProjectsForTaskResponse);

  // ── Generic graph relationships ────────────────────────────────────────────

  // CreateRelationship validates the (label, from_id, to_id) triple against
  // the Work edge-label whitelist and creates the edge. Idempotent — a
  // matching pre-existing edge is returned without creating a duplicate.
  // Error: INVALID_ARGUMENT (with InvalidRelationshipInfo detail) if the
  // triple is rejected; NOT_FOUND if an endpoint is missing.
  rpc CreateRelationship(CreateRelationshipRequest) returns (CreateRelationshipResponse);

  // DeleteRelationship removes the edge identified by (from_id, to_id, label).
  // Error: NOT_FOUND if no such edge exists.
  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipResponse);

  // TraverseRelationships returns the single-hop edges incident on vertex_id
  // matching the given label and direction. Returns an empty list (not an
  // error) when no edges match.
  rpc TraverseRelationships(TraverseRelationshipsRequest) returns (TraverseRelationshipsResponse);

  // ── Workflow runs (FEAT-20260601-001) ──────────────────────────────────────

  // CreateWorkflowRun anchors a new orchestrated execution. The returned run
  // is in WORKFLOW_RUN_STATUS_PENDING. When the request name is empty the
  // server generates one of the form `pipeline-YYYY-MM-DD-HHMMSS-<6hex>`.
  // Error: ALREADY_EXISTS when (agency_id, name) collides with an existing
  // run; INVALID_ARGUMENT when name has leading/trailing whitespace
  // (FEAT-20260602-001).
  rpc CreateWorkflowRun(CreateWorkflowRunRequest) returns (CreateWorkflowRunResponse);

  // GetWorkflowRun reads the run vertex plus its full closure: every Task,
  // TaskTodo, and edge reachable from the run, plus the IDs of foreign
  // (cross-service) entities the run referenced.
  // Error: NOT_FOUND if the run does not exist.
  rpc GetWorkflowRun(GetWorkflowRunRequest) returns (GetWorkflowRunResponse);

  // ListWorkflowRuns returns every WorkflowRun in the agency, newest first.
  // When request.name is non-empty the result is filtered to runs whose
  // name matches exactly (at most one row) (FEAT-20260602-001).
  rpc ListWorkflowRuns(ListWorkflowRunsRequest) returns (ListWorkflowRunsResponse);

  // RollbackWorkflowRun initiates the compensation sequence for the given run
  // (FEAT-20260602-004). Valid only when the run is in failed or completed
  // status. Transitions: failed/completed → rolling_back → rolled_back (or
  // rollback_failed on partial failure).
  // Errors: NOT_FOUND, FAILED_PRECONDITION (wrong source status or already
  // rolling back), ABORTED (foreign run dependency — roll back the dependent
  // run first).
  rpc RollbackWorkflowRun(RollbackWorkflowRunRequest) returns (RollbackWorkflowRunResponse);

  // CancelWorkflowRun flips an in_progress WorkflowRun to the cancelling
  // transient state, cascades work.task.cancelled to every non-terminal Task
  // in the run, and publishes work.run.cancelling (FEAT-20260602-008). A
  // separate finalization step elsewhere transitions the run to cancelled
  // after the quiesce deadline elapses.
  //
  // Idempotent: a repeated call on an already-cancelling run returns the
  // stored envelope without re-firing events or shifting the deadline.
  //
  // Errors: NOT_FOUND, FAILED_PRECONDITION (run is in any status other than
  // in_progress or cancelling).
  rpc CancelWorkflowRun(CancelWorkflowRunRequest) returns (CancelWorkflowRunResponse);

  // IncrementFailureBudget atomically increments the
  // failure_pipelines_used counter on the root WorkflowRun identified by
  // workflow_run_id. Cross calls this at failure-dispatch time, before
  // creating a child recovery run, to gate against budget exhaustion.
  // Idempotent on child_run_id: repeated calls with the same child_run_id
  // do not double-increment and return the current counter state
  // (FEAT-20260602-007).
  // Errors: NOT_FOUND if the root run does not exist.
  rpc IncrementFailureBudget(IncrementFailureBudgetRequest) returns (IncrementFailureBudgetResponse);

  // TouchWorkflowRunLastEventAt bumps last_event_at on the identified run.
  // Best-effort: ignores NotFound. Called by Cross on every published event
  // that carries a workflow_run_id (FEAT-20260602-006).
  rpc TouchWorkflowRunLastEventAt(TouchWorkflowRunLastEventAtRequest) returns (TouchWorkflowRunLastEventAtResponse);

  // ListWorkflowRunsStaleSince returns all non-terminal, unpaused WorkflowRuns
  // whose last_event_at is before cutoff. Used by the Cross watchdog sweeper
  // to find runs eligible for a work.run.timeout event (FEAT-20260602-006).
  rpc ListWorkflowRunsStaleSince(ListWorkflowRunsStaleSinceRequest) returns (ListWorkflowRunsResponse);

  // ── Markdown import ────────────────────────────────────────────────────────

  // ImportProject parses a JSON document describing a project and creates a
  // Project vertex, a Task vertex for each entry in "tasks", member_of edges
  // from every Task to the Project, and depends_on edges for each entry in a
  // task's "depends_on" array.
  // All imported tasks start in PENDING status; the original task ID
  // (e.g. "MVP-SF-001") is stored as a tag on each Task for traceability.
  // Error: INVALID_ARGUMENT if the document is malformed or missing required
  // fields ("project", non-empty "tasks", each task needs "id" and "title").
  rpc ImportProject(ImportProjectRequest) returns (ImportProjectResponse);
}

// ── Task lifecycle messages ───────────────────────────────────────────────────

message CreateTaskRequest {
  string agency_id = 1;
  Task   task      = 2;
}
message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string agency_id = 1;
  string task_id   = 2;
}
message GetTaskResponse {
  Task task = 1;
}

message UpdateTaskRequest {
  string agency_id    = 1;
  Task   task         = 2;
  string project_name = 3;    // required when resolving by task.task_name
  // update_mask names the snake_case fields of `task` that the caller intends
  // to overwrite. Fields not listed are preserved from the stored entity.
  // When empty the server falls back to replace-all behaviour (deprecated):
  // every mutable Task property is rewritten from `task`, so omitted fields
  // are silently zeroed. New callers MUST set update_mask.
  google.protobuf.FieldMask update_mask = 4;
}
message UpdateTaskResponse {
  Task task = 1;
}

message DeleteTaskRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string task_name    = 3;    // project-scoped name (e.g. "MVP-001"); used when task_id is empty
  string project_name = 4;    // required when resolving by task_name
}
message DeleteTaskResponse {}

message ListTasksRequest {
  string     agency_id = 1;
  TaskFilter filter    = 2;
}
message ListTasksResponse {
  repeated Task tasks = 1;
}

message GetTaskByNameRequest {
  string agency_id    = 1;
  string project_name = 2;
  string task_name    = 3;
}
message GetTaskByNameResponse {
  Task task = 1;
}

message CreateTaskInProjectRequest {
  string agency_id    = 1;
  string project_name = 2;
  Task   task         = 3;
}
message CreateTaskInProjectResponse {
  Task task = 1;
}

// ── Agent assignment messages ─────────────────────────────────────────────────

message AssignTaskRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string agent_id     = 3;  // entity ID of the Agent vertex
  string task_name    = 4;  // project-scoped name; used when task_id is empty
  string project_name = 5;  // required when resolving by task_name
  // workflow_run_id propagates the WorkflowRun anchor from the inbound event
  // (e.g. work.next.requested) onto the Task. Empty preserves the stored
  // value; non-empty is set on a task with empty stored value (and writes
  // the started_task edge), and a non-empty value that differs from the
  // stored one is rejected with FAILED_PRECONDITION
  // (codevaldwork.ErrWorkflowRunMismatch) — a task belonging to two runs
  // breaks the rollback invariant (FEAT-20260602-002).
  string workflow_run_id = 6;
}
message AssignTaskResponse {}

message UnassignTaskRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string task_name    = 3;  // project-scoped name; used when task_id is empty
  string project_name = 4;  // required when resolving by task_name
}
message UnassignTaskResponse {}

message FailTodoRequest {
  string agency_id = 1;
  string todo_id   = 2;
  // reason is an optional human-readable description forwarded to the
  // cascade log (e.g. "manual override by operator").
  string reason    = 3;
}
message FailTodoResponse {}

message UnblockTaskRequest {
  string agency_id = 1;
  string task_id   = 2;
  // note is an optional human-readable reason for unblocking, stored in the
  // direction event context (e.g. "Flutter toolchain installed — unblocking").
  string note      = 3;
}
message UnblockTaskResponse {
  Task task = 1;
}

message ListTaskTodosRequest {
  string agency_id        = 1;
  // workflow_run_id filters results to todos belonging to the given run.
  // When empty all todos for the agency are returned.
  string workflow_run_id  = 2;
}
message ListTaskTodosResponse {
  repeated TaskTodo todos = 1;
}

message UpsertAgentRequest {
  string agency_id = 1;
  Agent  agent     = 2;
}
message UpsertAgentResponse {
  Agent agent = 1;
}

message GetAgentRequest {
  string agency_id = 1;
  string agent_id  = 2;  // entity ID
}
message GetAgentResponse {
  Agent agent = 1;
}

message ListAgentsRequest {
  string agency_id = 1;
}
message ListAgentsResponse {
  repeated Agent agents = 1;
}

// ── Project messages ──────────────────────────────────────────────────────────

message CreateProjectRequest {
  string  agency_id = 1;
  Project project   = 2;
}
message CreateProjectResponse {
  Project project = 1;
}

message GetProjectRequest {
  string agency_id    = 1;
  string project_id   = 2;
  string project_name = 3;
}
message GetProjectResponse {
  Project project = 1;
}

message GetProjectByNameRequest {
  string agency_id    = 1;
  string project_name = 2;
}
message GetProjectByNameResponse {
  Project project = 1;
}

message UpdateProjectRequest {
  string  agency_id = 1;
  Project project   = 2;
}
message UpdateProjectResponse {
  Project project = 1;
}

message DeleteProjectRequest {
  string agency_id    = 1;
  string project_id   = 2;
  string project_name = 3;
}
message DeleteProjectResponse {}

message ListProjectsRequest {
  string agency_id = 1;
}
message ListProjectsResponse {
  repeated Project projects = 1;
}

message AddTaskToProjectRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string project_id   = 3;
  string project_name = 4;
}
message AddTaskToProjectResponse {}

message RemoveTaskFromProjectRequest {
  string agency_id    = 1;
  string task_id      = 2;
  string project_id   = 3;
  string project_name = 4;
}
message RemoveTaskFromProjectResponse {}

message ListTasksInProjectRequest {
  string agency_id    = 1;
  string project_id   = 2;
  string project_name = 3;
}
message ListTasksInProjectResponse {
  repeated Task tasks = 1;
}

message ListProjectsForTaskRequest {
  string agency_id = 1;
  string task_id   = 2;
}
message ListProjectsForTaskResponse {
  repeated Project projects = 1;
}

// ── Relationship messages ─────────────────────────────────────────────────────

message CreateRelationshipRequest {
  string                 agency_id  = 1;
  string                 label      = 2;
  string                 from_id    = 3;
  string                 to_id      = 4;
  google.protobuf.Struct properties = 5;
}
message CreateRelationshipResponse {
  Relationship relationship = 1;
}

message DeleteRelationshipRequest {
  string agency_id = 1;
  string label     = 2;
  string from_id   = 3;
  string to_id     = 4;
}
message DeleteRelationshipResponse {}

message TraverseRelationshipsRequest {
  string    agency_id = 1;
  string    vertex_id = 2;
  string    label     = 3;
  Direction direction = 4;
}
message TraverseRelationshipsResponse {
  repeated Relationship relationships = 1;
}

// ── Workflow run messages (FEAT-20260601-001) ─────────────────────────────────

// CreateWorkflowRunRequest mints a new WorkflowRun anchor for an
// orchestrated execution (FEAT-20260602-001).
message CreateWorkflowRunRequest {
  string agency_id     = 1;
  // name is an optional caller-supplied label, unique per agency.
  // When empty the server generates one.
  string name          = 2;
  // trigger_event names the event that started the run (e.g.
  // "pipeline.requested"). Free-form; persisted as-is.
  string trigger_event = 3;
  // initiator is an opaque caller identifier (operator email, service
  // name, etc.) — may be empty.
  string initiator     = 4;

  // parent_workflow_run_id is set by Cross's failure dispatch when
  // creating a child recovery run; empty for top-level runs
  // (FEAT-20260602-007).
  string parent_workflow_run_id = 5;
  // root_workflow_run_id is propagated from the parent's root for child
  // runs; for a top-level run the server defaults it to the new run's
  // own id (FEAT-20260602-007).
  string root_workflow_run_id   = 6;
  // failure_pipeline_budget caps recovery-pipeline activations for this
  // run's lineage. Resolved by start-pipeline (payload > agency >
  // env default) and frozen for the lifetime of the run; only persisted
  // on the root run (FEAT-20260602-007).
  int32  failure_pipeline_budget = 7;
}

message CreateWorkflowRunResponse {
  WorkflowRun run = 1;
}

message GetWorkflowRunRequest {
  string agency_id       = 1;
  string workflow_run_id = 2;
}
// GetWorkflowRunResponse carries the full closure: the run anchor plus every
// Task / TaskTodo / Relationship reachable from it, and the IDs of foreign
// cross-service entities the run referenced.
message GetWorkflowRunResponse {
  WorkflowRun           run              = 1;
  repeated Task         tasks            = 2;
  repeated TaskTodo     todos            = 3;
  repeated Relationship edges            = 4;
  repeated string       agent_run_ids    = 5;
  repeated string       function_job_ids = 6;
  repeated string       branch_names     = 7;
}

message ListWorkflowRunsRequest {
  string agency_id = 1;
  // name optionally filters the result to runs whose name matches exactly.
  // At most one row given the schema UniqueKey on name (FEAT-20260602-001).
  string name      = 2;
}
message ListWorkflowRunsResponse {
  repeated WorkflowRun runs = 1;
}

// ── Rollback messages (FEAT-20260602-004) ────────────────────────────────────

message RollbackWorkflowRunRequest {
  string agency_id       = 1;
  string workflow_run_id = 2;
  // reason is a human-readable explanation stored on the run and included in
  // the work.run.rolling_back and work.run.rolled_back events.
  string reason          = 3;
}

message RollbackWorkflowRunResponse {
  // run carries the updated WorkflowRun. On success the status is
  // WORKFLOW_RUN_STATUS_ROLLED_BACK; on partial failure it is
  // WORKFLOW_RUN_STATUS_ROLLBACK_FAILED.
  WorkflowRun run = 1;
}

// ── Cancel messages (FEAT-20260602-008) ──────────────────────────────────────

message CancelWorkflowRunRequest {
  string agency_id       = 1;
  string workflow_run_id = 2;
  // reason is a human-readable explanation persisted on the run row and
  // included in the work.run.cancelling and work.run.cancelled events.
  string reason          = 3;
  // cancelled_by identifies the operator or service that issued the cancel.
  // Stored on the run row for audit; included in the cancel events.
  string cancelled_by    = 4;
  // quiesce_timeout_ms is the number of milliseconds in-flight subscribers
  // are given to wind down before the run is finalised to cancelled. When
  // zero the server applies its default (30000 ms).
  int32  quiesce_timeout_ms = 5;
}

message CancelWorkflowRunResponse {
  // run carries the updated WorkflowRun in WORKFLOW_RUN_STATUS_CANCELLING.
  // cancelling_until, cancelled_by, and cancel_reason are populated on the
  // run vertex.
  WorkflowRun run = 1;
}

// ── Failure-budget messages (FEAT-20260602-007) ──────────────────────────────

message IncrementFailureBudgetRequest {
  string agency_id       = 1;
  // workflow_run_id is the root run whose counter is being incremented.
  string workflow_run_id = 2;
  // child_run_id is the recovery run about to be created. Used for
  // idempotency on retry — a repeated call with the same child_run_id
  // returns the existing counter without double-incrementing.
  string child_run_id    = 3;
}

message IncrementFailureBudgetResponse {
  // used is the post-increment failure_pipelines_used value.
  int32 used      = 1;
  // budget is the failure_pipeline_budget cap.
  int32 budget    = 2;
  // exhausted is true iff used > budget after this increment. Side-effect-
  // then-report contract: the counter is updated even when exhausted; the
  // caller must skip the recovery dispatch and fail the run.
  bool  exhausted = 3;
}

// ── Markdown import messages ──────────────────────────────────────────────────

message ImportProjectRequest {
  string agency_id = 1;
  // document is the raw JSON import document. Must be a valid JSON object
  // with a non-empty "project" string and a non-empty "tasks" array where
  // each entry has at minimum "id" and "title" fields.
  string document = 2;
}
message ImportProjectResponse {
  Project        project      = 1;
  repeated Task  tasks        = 2;
  // deps_created is the number of depends_on edges created between tasks.
  int32          deps_created = 3;
}

// ── Watchdog messages (FEAT-20260602-006) ─────────────────────────────────────

message TouchWorkflowRunLastEventAtRequest {
  string agency_id       = 1;
  string workflow_run_id = 2;
  // timestamp is the RFC 3339 value to write into last_event_at.
  string timestamp       = 3;
}

message TouchWorkflowRunLastEventAtResponse {}

// ListWorkflowRunsStaleSinceRequest selects runs whose last_event_at is before cutoff.
message ListWorkflowRunsStaleSinceRequest {
  string agency_id = 1;
  // cutoff is the RFC 3339 UTC timestamp. Runs with last_event_at < cutoff
  // and non-terminal status are returned.
  string cutoff    = 2;
}
