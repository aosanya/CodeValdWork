syntax = "proto3";

package codevaldwork.v1;

option go_package = "github.com/aosanya/CodeValdWork/gen/go/codevaldwork/v1;codevaldworkv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// TaskStatus mirrors the Go [TaskStatus] enumeration.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING     = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_COMPLETED   = 3;
  TASK_STATUS_FAILED      = 4;
  TASK_STATUS_CANCELLED   = 5;
  TASK_STATUS_BLOCKED     = 6;
}

// TaskPriority mirrors the Go [TaskPriority] enumeration.
enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW         = 1;
  TASK_PRIORITY_MEDIUM      = 2;
  TASK_PRIORITY_HIGH        = 3;
  TASK_PRIORITY_CRITICAL    = 4;
}

// Direction selects edge orientation for relationship traversal RPCs.
enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_OUTBOUND    = 1;
  DIRECTION_INBOUND     = 2;
}

// Task is the core domain entity managed by the TaskService.
//
// Field 7 was previously a string `assigned_to`; it was removed in MVP-WORK-010
// because task assignment moved to an `assigned_to` graph edge, set via
// AssignTask. Field number 7 stays reserved to prevent silent reuse. The name
// `assigned_to` was later reintroduced at field 20 as a read-only projection
// of that graph edge.
message Task {
  string        id              = 1;
  string        agency_id       = 2;
  reserved 3;
  string        description     = 4;
  TaskStatus    status          = 5;
  TaskPriority  priority        = 6;
  reserved 7;
  google.protobuf.Timestamp created_at      = 8;
  google.protobuf.Timestamp updated_at      = 9;
  google.protobuf.Timestamp completed_at    = 10;
  google.protobuf.Timestamp due_at          = 11;
  repeated string           tags            = 12;
  double                    estimated_hours = 13;
  string                    context         = 14;
  // task_name is the project-scoped human-readable name auto-generated on
  // CreateTaskInProject (e.g. "MVP-001"). Empty for tasks not in a project.
  string                    task_name       = 15;
  // project_name is the URL-safe slug of the project this task belongs to.
  // Empty for tasks not in a project.
  string                    project_name    = 16;
  // title is the short human-readable label for the task (e.g. "Farm Dashboard").
  // Distinct from description, which carries the full implementation spec.
  string                    title           = 17;
  // separate_branch indicates whether this task should be worked on in its own git branch.
  bool                      separate_branch = 18;
  // branch_name is the git branch to create/use for this task (e.g. "feature/SF-001_scaffolding").
  string                    branch_name     = 19;
  // assigned_to is the entity ID of the Agent currently responsible for this
  // task. Empty string means unassigned. Populated from the `assigned_to`
  // graph edge at query time; set via AssignTask / UnassignTask RPCs.
  string                    assigned_to     = 20;
  // workflow_run_id denormalises the WorkflowRun anchor onto the Task so
  // queries can filter by run-id without traversing the started_task edge.
  // Empty for tasks not produced under a run (FEAT-20260602-002).
  string                    workflow_run_id = 21;
}

// TaskFilter is used in ListTasks to constrain results.
// Unset fields (zero values) match all.
//
// assigned_to (string, field 3) was removed in MVP-WORK-010 — to find tasks
// for an agent, traverse inbound `assigned_to` edges from the Agent vertex.
message TaskFilter {
  TaskStatus   status   = 1;
  TaskPriority priority = 2;
  reserved 3;
  reserved "assigned_to";
  // workflow_run_id filters tasks to a specific WorkflowRun anchor when
  // non-empty (FEAT-20260602-002). Empty matches all.
  string       workflow_run_id = 4;
}

// Agent is the Work-domain projection of an AI agent. Each Agent is a graph
// vertex; tasks point to it via the `assigned_to` edge.
message Agent {
  string id           = 1;  // entity-graph storage key (server-assigned)
  string agency_id    = 2;
  string agent_id     = 3;  // external natural key, unique within agency
  string display_name = 4;
  string capability   = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  string role_name    = 8;  // role this agent fulfils (e.g. "domain-expert")
}

// Project is an optional container that groups related tasks (sprints,
// milestones, epics). Tasks become members via `member_of` edges.
message Project {
  string id          = 1;
  string agency_id   = 2;
  string name        = 3;
  string description = 4;
  reserved 5;
  reserved "due_at";
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  // github_repo is the canonical GitHub repository for the project, e.g.
  // "owner/name" or a full https URL. Optional.
  string github_repo   = 8;
  // project_name is the URL-safe slug derived from name: lowercase with
  // spaces replaced by underscores (e.g. "my project" → "my_project").
  // Set by the server on creation; immutable after that.
  string project_name  = 9;
  // task_prefix is prepended to the auto-generated task name counter when
  // tasks are created via CreateTaskInProject (e.g. "MVP-" → "MVP-001").
  // If empty, defaults to "<project_name>-".
  string task_prefix   = 10;
}

// TodoStatus mirrors the Go [TodoStatus] enumeration.
enum TodoStatus {
  TODO_STATUS_UNSPECIFIED = 0;
  TODO_STATUS_PENDING     = 1;
  TODO_STATUS_BLOCKED     = 2;
  TODO_STATUS_DISPATCHED  = 3;
  TODO_STATUS_COMPLETED   = 4;
  TODO_STATUS_FAILED      = 5;
}

// TaskTodo is a decomposed sub-task — the projection used by the
// WorkflowRun closure response (FEAT-20260601-001). Mirrors the
// codevaldwork.TaskTodo Go type, less storage-only metadata.
message TaskTodo {
  string                    id              = 1;
  string                    agency_id       = 2;
  string                    title           = 3;
  string                    description     = 4;
  string                    instructions    = 5;
  int32                     ordinality      = 6;
  bool                      can_run_parallel = 7;
  repeated int32            depends_on      = 8;
  TodoStatus                status          = 9;
  string                    parent_task_id  = 10;
  string                    decomp_run_id   = 11;
  string                    agent_id        = 12;
  string                    precalls        = 13;
  string                    todo_type       = 14;
  google.protobuf.Timestamp created_at      = 15;
  google.protobuf.Timestamp updated_at      = 16;
  // workflow_run_id is inherited from the parent Task at creation time so
  // the todo carries the run anchor of its parent (FEAT-20260602-002).
  string                    workflow_run_id = 17;
}

// WorkflowRunStatus mirrors the Go [WorkflowRunStatus] enumeration.
// Anchors the lifecycle of a single orchestrated execution (FEAT-20260601-001).
enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED  = 0;
  WORKFLOW_RUN_STATUS_PENDING      = 1;
  WORKFLOW_RUN_STATUS_IN_PROGRESS  = 2;
  WORKFLOW_RUN_STATUS_COMPLETED    = 3;
  WORKFLOW_RUN_STATUS_FAILED       = 4;
  WORKFLOW_RUN_STATUS_ROLLED_BACK  = 5;
}

// WorkflowRun anchors the closure of a single orchestrated execution.
// Linked to every Task / TaskTodo it produced via started_task / started_todo edges.
message WorkflowRun {
  string                    id              = 1;
  string                    agency_id       = 2;
  WorkflowRunStatus         status          = 3;
  string                    trigger_event   = 4;
  string                    initiator       = 5;
  string                    notes           = 6;
  repeated string           agent_run_ids   = 7;
  repeated string           function_job_ids = 8;
  repeated string           branch_names    = 9;
  google.protobuf.Timestamp started_at      = 10;
  google.protobuf.Timestamp completed_at    = 11;
  google.protobuf.Timestamp created_at      = 12;
  google.protobuf.Timestamp updated_at      = 13;
  // name is a caller-supplied or server-generated label unique per agency,
  // used as the correlation handle by test scripts and the headline column
  // in the WorkflowRuns UI list (FEAT-20260602-001).
  string                    name            = 14;
}

// Relationship is the Work-domain projection of a directed graph edge.
// label must be one of the whitelist values: assigned_to, blocks, subtask_of,
// depends_on, member_of.
message Relationship {
  string id        = 1;  // server-assigned edge key
  string agency_id = 2;
  string label     = 3;
  string from_id   = 4;
  string to_id     = 5;
  // Edge metadata. Struct preserves type fidelity (numbers, bools, lists)
  // so timestamps (e.g. assignedAt) round-trip correctly under the
  // schema-declared key.
  google.protobuf.Struct    properties = 6;
  google.protobuf.Timestamp created_at = 7;
}
