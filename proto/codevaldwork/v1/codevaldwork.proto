syntax = "proto3";

package codevaldwork.v1;

option go_package = "github.com/aosanya/CodeValdWork/gen/go/codevaldwork/v1;codevaldworkv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// TaskStatus mirrors the Go [TaskStatus] enumeration.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING     = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_COMPLETED   = 3;
  TASK_STATUS_FAILED      = 4;
  TASK_STATUS_CANCELLED   = 5;
}

// TaskPriority mirrors the Go [TaskPriority] enumeration.
enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW         = 1;
  TASK_PRIORITY_MEDIUM      = 2;
  TASK_PRIORITY_HIGH        = 3;
  TASK_PRIORITY_CRITICAL    = 4;
}

// Direction selects edge orientation for relationship traversal RPCs.
enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_OUTBOUND    = 1;
  DIRECTION_INBOUND     = 2;
}

// Task is the core domain entity managed by the TaskService.
//
// assigned_to (string, field 7) was removed in MVP-WORK-010 — task assignment
// is now an `assigned_to` graph edge from Task to Agent, set via AssignTask.
// The field number is reserved to prevent silent reuse.
message Task {
  string        id              = 1;
  string        agency_id       = 2;
  reserved 3;
  string        description     = 4;
  TaskStatus    status          = 5;
  TaskPriority  priority        = 6;
  reserved 7;
  reserved "assigned_to";
  google.protobuf.Timestamp created_at      = 8;
  google.protobuf.Timestamp updated_at      = 9;
  google.protobuf.Timestamp completed_at    = 10;
  google.protobuf.Timestamp due_at          = 11;
  repeated string           tags            = 12;
  double                    estimated_hours = 13;
  string                    context         = 14;
  // task_name is the project-scoped human-readable name auto-generated on
  // CreateTaskInProject (e.g. "MVP-001"). Empty for tasks not in a project.
  string                    task_name       = 15;
  // project_name is the URL-safe slug of the project this task belongs to.
  // Empty for tasks not in a project.
  string                    project_name    = 16;
  // title is the short human-readable label for the task (e.g. "Farm Dashboard").
  // Distinct from description, which carries the full implementation spec.
  string                    title           = 17;
}

// TaskFilter is used in ListTasks to constrain results.
// Unset fields (zero values) match all.
//
// assigned_to (string, field 3) was removed in MVP-WORK-010 — to find tasks
// for an agent, traverse inbound `assigned_to` edges from the Agent vertex.
message TaskFilter {
  TaskStatus   status   = 1;
  TaskPriority priority = 2;
  reserved 3;
  reserved "assigned_to";
}

// Agent is the Work-domain projection of an AI agent. Each Agent is a graph
// vertex; tasks point to it via the `assigned_to` edge.
message Agent {
  string id           = 1;  // entity-graph storage key (server-assigned)
  string agency_id    = 2;
  string agent_id     = 3;  // external natural key, unique within agency
  string display_name = 4;
  string capability   = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// Project is an optional container that groups related tasks (sprints,
// milestones, epics). Tasks become members via `member_of` edges.
message Project {
  string id          = 1;
  string agency_id   = 2;
  string name        = 3;
  string description = 4;
  reserved 5;
  reserved "due_at";
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  // github_repo is the canonical GitHub repository for the project, e.g.
  // "owner/name" or a full https URL. Optional.
  string github_repo   = 8;
  // project_name is the URL-safe slug derived from name: lowercase with
  // spaces replaced by underscores (e.g. "my project" → "my_project").
  // Set by the server on creation; immutable after that.
  string project_name  = 9;
  // task_prefix is prepended to the auto-generated task name counter when
  // tasks are created via CreateTaskInProject (e.g. "MVP-" → "MVP-001").
  // If empty, defaults to "<project_name>-".
  string task_prefix   = 10;
}

// Relationship is the Work-domain projection of a directed graph edge.
// label must be one of the whitelist values: assigned_to, blocks, subtask_of,
// depends_on, member_of.
message Relationship {
  string id        = 1;  // server-assigned edge key
  string agency_id = 2;
  string label     = 3;
  string from_id   = 4;
  string to_id     = 5;
  // Edge metadata. Struct preserves type fidelity (numbers, bools, lists)
  // so timestamps (e.g. assignedAt) round-trip correctly under the
  // schema-declared key.
  google.protobuf.Struct    properties = 6;
  google.protobuf.Timestamp created_at = 7;
}
